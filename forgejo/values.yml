# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/app-template-4.6.2/charts/other/app-template/values.schema.json
host: &host 'forgejo.k3s.pro'
http_port: &http_port 3000

controllers:
  main:
    strategy: Recreate
    replicas: 1

    containers:
      app:
        image:
          repository: codeberg.org/forgejo/forgejo
          tag: 10.0.3
          pullPolicy: IfNotPresent

        env:
          FORGEJO__server__DOMAIN: *host
          FORGEJO__server__ROOT_URL: 'https://forgejo.k3s.pro'
          FORGEJO__server__HTTP_PORT: *http_port
          FORGEJO__server__SSH_DOMAIN: *host
          FORGEJO__server__SSH_PORT: '2222'
          FORGEJO__server__SSH_LISTEN_PORT: '2222'
          FORGEJO__actions__ENABLED: 'true'
          FORGEJO__actions__DEFAULT_ACTIONS_URL: https://data.forgejo.org
          FORGEJO__database__DB_TYPE: postgres
          FORGEJO__database__HOST: forgejo-db-rw.forgejo.svc.cluster.local:5432
          FORGEJO__database__NAME: app
          FORGEJO__database__USER:
            valueFrom:
              secretKeyRef:
                name: forgejo-db-app
                key: username
          FORGEJO__database__PASSWD:
            valueFrom:
              secretKeyRef:
                name: forgejo-db-app
                key: password

        envFrom:
          - secretRef:
              name: forgejo-env

        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *http_port
              initialDelaySeconds: 30
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness: *probes

  runner:
    strategy: Recreate
    replicas: 1

    pod:
      securityContext:
        fsGroup: 1000

    containers:
      runner:
        image:
          repository: data.forgejo.org/forgejo/runner
          tag: 12
          pullPolicy: IfNotPresent

        command:
          - sh
          - -ec
          - |
              cd /data
              if [ ! -f .runner ]; then
                forgejo-runner register --no-interactive --instance "$FORGEJO_INSTANCE_URL" --token "$FORGEJO_RUNNER_REGISTRATION_TOKEN" --name "$FORGEJO_RUNNER_NAME" --labels "$FORGEJO_RUNNER_LABELS"
              fi
              exec forgejo-runner daemon

        env:
          DOCKER_HOST: tcp://localhost:2375
          FORGEJO_INSTANCE_URL: http://forgejo.forgejo.svc.cluster.local:3000
          FORGEJO_RUNNER_NAME: forgejo-runner
          FORGEJO_RUNNER_LABELS: ubuntu-latest:docker://docker.io/library/node:24-bookworm,docker:docker://docker.io/library/node:24-bookworm

        envFrom:
          - secretRef:
              name: forgejo-runner-env

        securityContext:
          runAsGroup: 1000
          runAsUser: 1000

      docker-in-docker:
        image:
          repository: docker
          tag: 29-dind
          pullPolicy: IfNotPresent

        args:
          - dockerd
          - --host=tcp://0.0.0.0:2375
          - --tls=false

        env:
          DOCKER_TLS_CERTDIR: ''

        securityContext:
          privileged: true

persistence:
  data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 10Gi
    advancedMounts:
      main:
        app:
          - path: /data

  runner-data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 5Gi
    advancedMounts:
      runner:
        runner:
          - path: /data

  docker-graph-storage:
    enabled: true
    type: emptyDir
    advancedMounts:
      runner:
        docker-in-docker:
          - path: /var/lib/docker

service:
  app:
    controller: main
    ports:
      http:
        port: *http_port
ingress:
  main:
    enabled: true
    annotations:
      gethomepage.dev/enabled: 'true'
      gethomepage.dev/name: Forgejo
      gethomepage.dev/description: Self-hosted Git service
      gethomepage.dev/group: Dev
      gethomepage.dev/icon: forgejo.png
      kubernetes.io/ingress.class: 'traefik'
      cert-manager.io/cluster-issuer: 'letsencrypt'
    className: 'traefik'
    hosts:
      - host: *host
        paths:
          - path: /
            pathType: Prefix
            service:
              identifier: app
              port: http
    tls:
      - hosts:
          - *host
        secretName: forgejo-ingress-cert
