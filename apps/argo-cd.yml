# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-cd
spec:
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argo-cd

  sources:
    - path: argo-cd/templates
      repoURL: 'https://github.com/dkarter/k3s-cluster-apps.git'
      targetRevision: HEAD

    - repoURL: 'https://github.com/dkarter/k3s-cluster-apps.git'
      targetRevision: HEAD
      ref: values

    - chart: argo-cd
      repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 9.5.11
      helm:
        releaseName: argo-cd
        valueFiles:
          - $values/argo-cd/values.yml

  project: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true

  # The redis-ha chart added selector labels that cannot be patched onto the
  # existing HAProxy Deployment. Ignore only the immutable selector so sync can
  # converge without deleting and recreating ArgoCD's Redis HAProxy workload.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: argo-cd-redis-ha-haproxy
      namespace: argo-cd
      jsonPointers:
        - /spec/selector
