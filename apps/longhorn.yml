# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/argoproj.io/application_v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn
spec:
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: longhorn-system

  sources:
    - chart: longhorn
      repoURL: https://charts.longhorn.io
      targetRevision: 1.11.1
      helm:
        releaseName: longhorn
        valuesObject:
          defaultBackupStore:
            backupTarget: 's3://longhorn-backups@us-east-1/'
            backupTargetCredentialSecret: longhorn-backup-target
            pollInterval: 180

    - path: longhorn
      repoURL: 'https://github.com/dkarter/k3s-cluster-apps.git'
      targetRevision: HEAD

  project: default

  syncPolicy:
    automated:
      # Prune only removes ArgoCD-tracked chart resources that disappear from
      # the Longhorn release, such as obsolete Services. Longhorn volumes and
      # application PVCs are not defined by this Application.
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
