# yaml-language-server: $schema=https://raw.githubusercontent.com/evilmartians/lefthook/master/schema.json

output:
  - summary

commit-msg:
  parallel: true
  jobs:
    - name: conventional commits
      run: committed --commit-file {1}

pre-push:
  parallel: true
  jobs:
    - name: Validate YAML files against schemas
      run: task validate

    - name: Check drift in yaml-language-server schemas when updating CRDs
      run: task validate:crd-schema-annotations

    - name: Check drift in yaml-language-server schemas for values when updating helm chart
      run: task validate:values-schema-annotations

    - name: Check formatting
      run: task fmt:check
